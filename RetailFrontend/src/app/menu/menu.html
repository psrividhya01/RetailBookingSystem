<app-navbar></app-navbar>

<div class="container">
  <!-- Loading State -->
  <div class="loading" *ngIf="isLoading">Loading menu...</div>

  <!-- Error State -->
  <div class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</div>

  <ng-container *ngIf="!isLoading && !errorMessage">
    <!-- Category Tabs -->
    <div class="categories">
      <button
        *ngFor="let category of categories"
        [class.active]="category.name === selectedCategory"
        (click)="filterByCategory(category.name)"
      >
        {{ category }}
      </button>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="filteredItems.length === 0">
      No items available in this category.
    </div>

    <!-- Menu Grid -->
    <div class="menu-grid" *ngIf="filteredItems.length > 0">
      <div class="menu-card" *ngFor="let item of filteredItems">
        <div class="card-image">
          <img [src]="item.imageUrl" [alt]="item.name" />
        </div>
        <div class="card-body">
          <h3>{{ item.name }}</h3>
          <div class="card-meta">
            <span class="price">₹{{ item.price }}</span>
            <span class="rating">⭐ {{ item.rating }}</span>
          </div>
          <button class="add-btn" (click)="addToCart(item)">Add to Cart</button>
        </div>
      </div>
    </div>
  </ng-container>
</div>
